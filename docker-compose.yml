services:
  klondike:
    image: ghcr.io/yourusername/klondike:latest
    volumes:
      - klondike-data:/data
  switchboard:
    image: ghcr.io/yourusername/switchboard:latest
    ports:
      - "4080:4080"
    environment:
      KLONDIKE_URL: http://klondike:3000
    depends_on:
      - klondike

volumes:
  klondike-data:
